<style>
  :root {
    --bg: #1a1a18;
    --surface: #232320;
    --card: #2a2a26;
    --gold: #c9a84c;
    --gold-light: #e8c96e;
    --text: #e8e4d8;
    --text-muted: #a09880;
    --red: #c0392b;
    --border: #3a3a34;
    --radius: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans KR', 'Noto Sans SC', 'Noto Sans Khmer', -apple-system, sans-serif;
    min-height: 100vh;
  }

  /* Header */
  .site-header {
    background: linear-gradient(135deg, #0d0d0b 0%, #1a1a16 60%, #222218 100%);
    border-bottom: 1px solid var(--gold);
    padding: 18px 20px 14px;
    text-align: center;
    position: relative;
  }
  @media (min-width: 700px) { .site-header { padding: 28px 20px 20px; } }
  .logo {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(2.2rem, 8vw, 3.8rem);
    font-weight: 600;
    letter-spacing: 0.18em;
    color: var(--gold);
    text-transform: uppercase;
    line-height: 1;
  }
  .logo-sub {
    font-size: 0.75rem;
    letter-spacing: 0.35em;
    color: var(--text-muted);
    text-transform: uppercase;
    margin-top: 6px;
  }
  .gold-line {
    width: 60px;
    height: 1px;
    background: var(--gold);
    margin: 14px auto;
    opacity: 0.6;
  }

  /* Language switcher */
  .lang-bar {
    display: flex;
    justify-content: center;
    gap: 8px;
    padding: 10px 16px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }
  .lang-btn {
    flex: 1;
    max-width: 90px;
    padding: 9px 8px;
    border: 1px solid var(--border);
    border-radius: 20px;
    background: transparent;
    color: var(--text-muted);
    font-size: 0.82rem;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.02em;
    min-height: 44px; /* 터치 최소 크기 */
  }
  .lang-btn:hover { border-color: var(--gold); color: var(--gold); }
  .lang-btn.active {
    background: var(--gold);
    border-color: var(--gold);
    color: #1a1a18;
    font-weight: 700;
  }

  /* Category Nav */
  .cat-nav {
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
    display: flex;
    padding: 0 12px;
  }
  .cat-nav::-webkit-scrollbar { display: none; }
  .cat-nav-link {
    padding: 12px 14px;
    font-size: 0.78rem;
    color: var(--text-muted);
    text-decoration: none;
    white-space: nowrap;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
    font-weight: 500;
    letter-spacing: 0.03em;
  }
  .cat-nav-link:hover, .cat-nav-link.active {
    color: var(--gold);
    border-bottom-color: var(--gold);
  }

  /* Sections */
  main { max-width: 1200px; margin: 0 auto; padding: 0 10px 80px; }
  .category-section { margin-top: 28px; }
  @media (min-width: 700px) { main { padding: 0 16px 60px; } .category-section { margin-top: 40px; } }
  .cat-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(1.4rem, 5vw, 2rem);
    color: var(--gold);
    font-weight: 600;
    letter-spacing: 0.06em;
    padding: 16px 0 8px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 20px;
    display: flex;
    align-items: baseline;
    gap: 14px;
  }
  .cat-title-ko {
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 0.9rem;
    color: var(--text-muted);
    font-weight: 400;
    letter-spacing: 0.02em;
  }

  /* Grid — mobile: 2열, tablet+: 3열 */
  .menu-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  @media (min-width: 700px) { .menu-grid { grid-template-columns: 1fr 1fr 1fr; gap: 14px; } }
  @media (min-width: 1000px) { .menu-grid { grid-template-columns: repeat(4, 1fr); } }

  /* Card */
  .menu-card {
    background: var(--card);
    border-radius: var(--radius);
    overflow: hidden;
    border: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    /* 터치 피드백 */
    -webkit-tap-highlight-color: transparent;
  }
  @media (hover: hover) {
    .menu-card { transition: transform 0.18s, box-shadow 0.18s; }
    .menu-card:hover { transform: translateY(-3px); box-shadow: 0 8px 28px rgba(0,0,0,0.5), 0 0 0 1px var(--gold); }
    .menu-card:hover .card-img { transform: scale(1.05); }
  }
  .card-img-wrap {
    position: relative;
    width: 100%;
    aspect-ratio: 1/1;
    overflow: hidden;
    background: #111;
  }
  @media (min-width: 700px) { .card-img-wrap { aspect-ratio: 4/3; } }
  .card-img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    transition: transform 0.3s;
  }
  .spicy-badge {
    position: absolute;
    top: 6px;
    right: 6px;
    background: rgba(0,0,0,0.65);
    border-radius: 6px;
    padding: 2px 5px;
    font-size: 0.8rem;
    backdrop-filter: blur(4px);
  }
  .card-body {
    padding: 10px 10px 12px;
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }
  @media (min-width: 700px) { .card-body { padding: 14px 14px 16px; } }
  .card-name {
    font-size: 0.82rem;
    font-weight: 500;
    color: var(--text);
    line-height: 1.4;
    margin-bottom: 6px;
  }
  @media (min-width: 700px) { .card-name { font-size: 0.95rem; } }
  .card-price {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.05rem;
    font-weight: 600;
    color: var(--gold-light);
    letter-spacing: 0.04em;
    margin-top: 4px;
  }
  @media (min-width: 700px) { .card-price { font-size: 1.15rem; } }

  /* Placeholder */
  .card-img-placeholder {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #1e1e1a, #2a2a22);
    color: var(--text-muted);
    font-size: 0.75rem;
    gap: 8px;
    padding: 12px;
    text-align: center;
  }
  .card-img-placeholder svg { opacity: 0.3; }

  /* Image skeleton loading */
  .card-img-wrap {
    background: linear-gradient(90deg, #1e1e1a 25%, #2a2a22 50%, #1e1e1a 75%);
    background-size: 200% 100%;
    animation: skeleton 1.4s ease infinite;
  }
  .card-img-wrap picture { display: contents; }
  .card-img-wrap img { transition: opacity 0.3s; }
  .card-img-wrap img:not([src]) { opacity: 0; }
  @keyframes skeleton {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }
  /* Stop shimmer once image loads */
  .card-img-wrap:has(img[complete]) { animation: none; }
</style>
</head>

// Auto-detect browser language
function detectLang() {
  const nav = navigator.language || navigator.userLanguage || 'en';
  const l = nav.toLowerCase();
  if (l.startsWith('ko')) return 'ko';
  if (l.startsWith('zh')) return 'zh';
  if (l.startsWith('km') || l.startsWith('kh')) return 'km';
  return 'en';
}
let currentLang = detectLang();


function setLang(lang, btn) {
  currentLang = lang;
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
  const target = btn || document.querySelector(`.lang-btn[data-lang="${lang}"]`);
  if (target) target.classList.add('active');
  renderMenu();
  renderNav();
}

function renderNav() {
  const nav = document.getElementById('catNav');
  nav.innerHTML = CATEGORIES.map(cat => {
    const name = CAT_NAMES[cat.id] ? CAT_NAMES[cat.id][currentLang] : cat.names[currentLang];
    return `<a class="cat-nav-link" href="#cat-${cat.id}">${name}</a>`;
  }).join('');
}

function renderMenu() {
  const main = document.getElementById('mainContent');
  let globalIdx = 0;
  main.innerHTML = CATEGORIES.map(cat => {
    const catName = CAT_NAMES[cat.id] ? CAT_NAMES[cat.id][currentLang] : cat.names[currentLang];
    const catKo = cat.names.ko;
    const items = cat.items.map(item => {
      const idx = globalIdx++;
      const eager = idx < 4;
      const base = item.img.replace(/\.[^.]+$/, '');
      const webp = 'images/' + base + '.webp';
      const jpeg = 'images/' + item.img;
      const imgHtml = `<picture>
          <source srcset="${webp}" type="image/webp">
          <img class="card-img" src="${jpeg}" alt="${item.en}"${eager ? ' fetchpriority="high"' : ' loading="lazy"'} decoding="async">
        </picture>`;
      const spicy = item.spicy ? `<span class="spicy-badge">🌶</span>` : '';
      return `
        <article class="menu-card">
          <div class="card-img-wrap">${imgHtml}${spicy}</div>
          <div class="card-body">
            <div class="card-name">${item[currentLang]}</div>
            <div class="card-price">${item.price}</div>
          </div>
        </article>`;
    }).join('');
    return `
      <section class="category-section" id="cat-${cat.id}">
        <h2 class="cat-title">${catName}<span class="cat-title-ko">${catKo}</span></h2>
        <div class="menu-grid">${items}</div>
      </section>`;
  }).join('');
}

setLang(currentLang);

// Sticky nav active highlight on scroll
const observer = new IntersectionObserver(entries => {
  entries.forEach(e => {
    if (e.isIntersecting) {
      const id = e.target.id;
      document.querySelectorAll('.cat-nav-link').forEach(a => {
        a.classList.toggle('active', a.getAttribute('href') === '#'+id);
      });
    }
  });
}, { threshold: 0.3 });
document.querySelectorAll('.category-section').forEach(s => observer.observe(s));
</script>
</body>
</html>
