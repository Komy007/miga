  <style>
    /* ── TOKENS ── */
    :root {
      --bg: #E5F5F2;
      --dark: #072030;
      --teal: #1A9B88;
      --tb: #1DCFBA;
      --border: #96C8D0;
      --lbar: #C4E5E8;
      --text: #0B2830;
      --muted: #3A9888;
      --red: #B03020;
      --serif: 'Cormorant Garamond', Georgia, serif;
      --sans: 'Noto Sans KR', 'Noto Sans SC', 'Noto Sans Khmer', -apple-system, sans-serif;
    }

    /* ── RESET ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100vh; }

    /* ── HEADER ── */
    #site-header {
      background: var(--dark);
      padding: 38px 20px 26px;
      padding-top: calc(38px + env(safe-area-inset-top, 0px));
      text-align: center;
    }
    .logo {
      font-family: var(--serif);
      font-size: clamp(2.8rem, 10vw, 4.6rem);
      font-weight: 600;
      letter-spacing: .24em;
      color: var(--tb);
      text-transform: uppercase;
      line-height: 1;
    }
    .header-divider {
      display: flex;
      align-items: center;
      gap: 16px;
      justify-content: center;
      margin-top: 14px;
    }
    .header-line { flex: 1; max-width: 56px; height: 1px; background: var(--tb); opacity: .45; }
    .header-sub { font-size: .65rem; letter-spacing: .46em; color: #5BBFB0; text-transform: uppercase; }

    /* ── LANG BAR ── */
    #lang-bar {
      display: flex;
      justify-content: center;
      gap: 8px;
      padding: 12px 16px;
      background: var(--lbar);
      border-bottom: 1px solid var(--border);
    }
    .lang-btn {
      padding: 10px 18px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: transparent;
      color: #2A8878;
      font-weight: 400;
      font-size: .8rem;
      cursor: pointer;
      min-height: 44px;
      font-family: inherit;
      letter-spacing: .04em;
      transition: all .2s;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }
    .lang-btn.active {
      background: var(--teal);
      border-color: var(--teal);
      color: #fff;
      font-weight: 700;
    }

    /* ── CATEGORY NAV — z-index 1100 stays above popup ── */
    #cat-nav {
      position: sticky;
      top: 0;
      z-index: 1100;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      display: flex;
      padding: 0 10px;
      box-shadow: 0 2px 12px rgba(0,45,60,.09);
    }
    #cat-nav::-webkit-scrollbar { display: none; }
    .cat-link {
      padding: 15px 12px;
      font-size: .76rem;
      color: var(--muted);
      text-decoration: none;
      white-space: nowrap;
      border-bottom: 2px solid transparent;
      font-weight: 400;
      letter-spacing: .03em;
      transition: all .2s;
      flex-shrink: 0;
      touch-action: manipulation;
    }
    .cat-link.active { color: var(--teal); border-bottom-color: var(--teal); font-weight: 600; }

    /* ── MAIN ── */
    #main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 12px calc(100px + env(safe-area-inset-bottom, 0px));
    }
    .cat-section { margin-top: 36px; }
    .cat-header {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 14px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border);
    }
    .cat-accent { width: 3px; min-height: 38px; background: var(--teal); border-radius: 2px; margin-top: 3px; flex-shrink: 0; }
    .cat-title { font-family: var(--serif); font-size: clamp(1.4rem,4vw,1.85rem); font-weight: 600; color: var(--text); letter-spacing: .05em; line-height: 1.1; }
    .cat-sub { font-size: .76rem; color: var(--muted); margin-top: 4px; letter-spacing: .02em; }

    /* ── GRID ── */
    .items-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    @media (min-width: 680px) {
      .items-grid { grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
    }
    @media (min-width: 1040px) { .items-grid { grid-template-columns: 1fr 1fr 1fr 1fr; gap: 12px; } }

    /* ── CARD ── */
    .menu-card {
      display: flex;
      flex-direction: column;
      background: #fff;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid #B4D9E2;
      box-shadow: 0 1px 6px rgba(0,45,60,.07);
      transition: transform .18s, box-shadow .18s;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      cursor: pointer;
      user-select: none;
    }
    .menu-card:active { transform: scale(.982); box-shadow: 0 1px 3px rgba(0,45,60,.05); }
    @media (hover: hover) {
      .menu-card:hover { transform: translateY(-2px); box-shadow: 0 10px 32px rgba(0,45,60,.14); }
      .menu-card:hover .card-img { transform: scale(1.07); }
    }
    .card-img-wrap { width: 100%; aspect-ratio: 1/1; overflow: hidden; background: #BCD8DF; }
    .card-img {
      width: 100%; height: 100%;
      object-fit: cover; object-position: center;
      display: block;
      transition: transform .4s;
      filter: brightness(1.04) contrast(1.07) saturate(1.13);
    }
    .card-body { padding: 10px 10px 12px; display: flex; flex-direction: column; justify-content: flex-start; gap: 3px; min-width: 0; }
    .card-name { font-size: .93rem; font-weight: 500; color: var(--text); line-height: 1.4; text-wrap: pretty; }
    .card-sec { font-size: .75rem; color: var(--muted); line-height: 1.3; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .card-price-row { display: flex; align-items: center; gap: 7px; margin-top: 3px; }
    .card-price { font-family: var(--serif); font-size: 1.15rem; font-weight: 600; color: var(--teal); letter-spacing: .02em; }
    .spicy-badge { font-size: .6rem; font-weight: 700; letter-spacing: .09em; color: var(--red); border: 1px solid var(--red); border-radius: 3px; padding: 1px 5px; flex-shrink: 0; line-height: 1.6; }

    /* ── POPUP — z-index 1000, nav floats above at 1100 ── */
    #popup {
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: rgba(4,18,28,.92);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      padding-top: calc(20px + env(safe-area-inset-top, 0px));
      padding-bottom: calc(20px + env(safe-area-inset-bottom, 0px));
      animation: fadeIn .2s ease;
    }
    #popup[hidden] { display: none; }
    #popup-inner {
      background: #F2FAFA;
      border-radius: 16px;
      max-width: 460px;
      width: 100%;
      overflow: hidden;
      box-shadow: 0 40px 80px rgba(0,0,0,.55);
      animation: popupIn .3s cubic-bezier(.34,1.4,.64,1);
      position: relative;
      max-height: 88vh;
      overflow-y: auto;
    }
    #popup-img-wrap { position: relative; aspect-ratio: 4/3; overflow: hidden; background: #BCD8DF; }
    #popup-img { width: 100%; height: 100%; object-fit: cover; display: block; filter: brightness(1.04) contrast(1.07) saturate(1.13); }
    #popup-spicy { position: absolute; bottom: 12px; left: 12px; background: var(--red); color: #fff; font-size: .63rem; font-weight: 700; letter-spacing: .12em; padding: 4px 11px; border-radius: 4px; }
    #popup-spicy[hidden] { display: none; }
    #popup-close {
      position: absolute; top: 12px; right: 12px;
      width: 40px; height: 40px; min-width: 40px;
      border-radius: 50%; background: rgba(4,18,28,.78);
      border: none; color: #fff; font-size: 1.5rem;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      backdrop-filter: blur(4px); font-family: inherit;
      touch-action: manipulation; -webkit-tap-highlight-color: transparent;
    }
    #popup-info { padding: 20px 22px 24px; }
    .popup-en { font-family: var(--serif); font-size: 1.8rem; font-weight: 600; color: var(--text); letter-spacing: .02em; line-height: 1.2; margin-bottom: 10px; }
    .popup-names { display: flex; flex-direction: column; gap: 3px; margin-bottom: 18px; padding-bottom: 18px; border-bottom: 1px solid #A8D8D4; }
    .popup-ko { font-size: .92rem; color: #0C3030; line-height: 1.5; }
    .popup-zh { font-size: .86rem; color: #2A5C58; line-height: 1.5; }
    .popup-km { font-size: .82rem; color: #3A7870; line-height: 1.5; }
    .popup-price { font-family: var(--serif); font-size: 2.1rem; font-weight: 600; color: var(--teal); letter-spacing: .02em; line-height: 1; }

    @keyframes popupIn { from { opacity:0; transform:translateY(22px) scale(.96) } to { opacity:1; transform:translateY(0) scale(1) } }
    @keyframes fadeIn { from { opacity:0 } to { opacity:1 } }
  </style>
</head>

/* ── FLAT INDEX ── */
const ALL_ITEMS = [];
CATEGORIES.forEach(cat => cat.items.forEach(item => ALL_ITEMS.push(item)));

/* ── STATE ── */
let lang = 'en';

/* ── LANG ── */
function detectLang() {
  const n = (navigator.language || 'en').toLowerCase();
  if (n.startsWith('ko')) return 'ko';
  if (n.startsWith('zh')) return 'zh';
  if (n.startsWith('km') || n.startsWith('kh')) return 'km';
  return 'en';
}

function setLang(newLang) {
  lang = newLang;
  document.querySelectorAll('.lang-btn').forEach(b =>
    b.classList.toggle('active', b.dataset.lang === lang)
  );
  renderNav();
  renderMenu();
}

/* ── NAV ── */
function renderNav() {
  document.getElementById('cat-nav').innerHTML =
    CATEGORIES.map(cat =>
      `<a class="cat-link" href="#cat-${cat.id}" data-cat-id="${cat.id}">${cat.names[lang] || cat.names.en}</a>`
    ).join('');
}

/* ── MENU ── */
function renderMenu() {
  const frag = document.createDocumentFragment();
  let idx = 0;
  CATEGORIES.forEach(cat => {
    const sec = document.createElement('section');
    sec.id = 'cat-' + cat.id;
    sec.dataset.sectionId = cat.id;
    sec.className = 'cat-section';
    const catName = cat.names[lang] || cat.names.en;
    let html = `<div class="cat-header"><div class="cat-accent"></div><div><div class="cat-title">${catName}</div><div class="cat-sub">${cat.names.ko}</div></div></div><div class="items-grid">`;
    cat.items.forEach(item => {
      const i = idx++;
      const eager = i < 4;
      const src = 'images/' + item.img.replace('.jpeg', '.webp');
      const name = item[lang] || item.en;
      const sec2 = lang !== 'ko' ? item.ko : item.en;
      const load = eager ? 'fetchpriority="high" decoding="sync"' : 'loading="lazy" decoding="async"';
      const spicy = item.spicy ? '<span class="spicy-badge">SPICY</span>' : '';
      html += `<article class="menu-card" data-idx="${i}" tabindex="0" role="button" aria-label="${item.en}"><div class="card-img-wrap"><img class="card-img" src="${src}" alt="${item.en}" ${load} width="104" height="104"></div><div class="card-body"><div class="card-name">${name}</div><div class="card-sec">${sec2}</div><div class="card-price-row"><span class="card-price">${item.price}</span>${spicy}</div></div></article>`;
    });
    html += '</div>';
    sec.innerHTML = html;
    frag.appendChild(sec);
  });
  const main = document.getElementById('main');
  main.innerHTML = '';
  main.appendChild(frag);
  setupObserver();
}

/* ── POPUP ── */
function openPopup(i) {
  const item = ALL_ITEMS[i];
  document.getElementById('popup-img').src = 'images/' + item.img.replace('.jpeg', '.webp');
  document.getElementById('popup-name-en').textContent = item.en;
  document.getElementById('popup-name-ko').textContent = item.ko;
  document.getElementById('popup-name-zh').textContent = item.zh;
  document.getElementById('popup-name-km').textContent = item.km;
  document.getElementById('popup-price').textContent = item.price;
  document.getElementById('popup-spicy').hidden = !item.spicy;
  document.getElementById('popup').hidden = false;
  document.body.style.overflow = 'hidden';
}

function closePopup() {
  document.getElementById('popup').hidden = true;
  document.body.style.overflow = '';
}

/* ── INTERSECTION OBSERVER ── */
let _obs = null;
function setupObserver() {
  if (_obs) _obs.disconnect();
  _obs = new IntersectionObserver(entries => {
    entries.forEach(e => {
      if (e.isIntersecting) {
        const id = e.target.dataset.sectionId;
        document.querySelectorAll('.cat-link').forEach(a =>
          a.classList.toggle('active', a.dataset.catId === id)
        );
      }
    });
  }, { threshold: 0.1, rootMargin: '-56px 0px -48% 0px' });
  document.querySelectorAll('[data-section-id]').forEach(s => _obs.observe(s));
}

/* ── EVENTS ── */
// Lang bar
document.getElementById('lang-bar').addEventListener('click', e => {
  const btn = e.target.closest('.lang-btn');
  if (btn) setLang(btn.dataset.lang);
});

// Card click (delegation from main)
document.getElementById('main').addEventListener('click', e => {
  const card = e.target.closest('[data-idx]');
  if (card) openPopup(+card.dataset.idx);
});
document.getElementById('main').addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    const card = e.target.closest('[data-idx]');
    if (card) openPopup(+card.dataset.idx);
  }
});

// Popup close
document.getElementById('popup').addEventListener('click', e => {
  if (e.target === document.getElementById('popup')) closePopup();
});
document.getElementById('popup-close').addEventListener('click', closePopup);
document.addEventListener('keydown', e => { if (e.key === 'Escape') closePopup(); });

/* ── INIT ── */
setLang(detectLang());
</script>
